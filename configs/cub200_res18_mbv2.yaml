dataset:
  name: cub200
  root: ./data/CUB_200_2011
  image_size: 224
  download: false
models:
  peer_a: mobilenet_v2
  peer_b: resnet18
  # Fine-grained CUB is commonly evaluated with ImageNet-pretrained backbones.
  pretrained: true
training:
  epochs: 100
  batch_size: 64
optimizer:
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  nesterov: true
scheduler:
  name: cosine
loss:
  mode: badd
  tau: 3.0
  alpha: 0.5
  clip_min: 0.8
  clip_max: 1.2
  warmup_epochs: 5
analysis:
  log_interval: 10
  top_fraction: 0.2
  max_trace_rows: 0
runtime:
  output_root: ./paper_experiments_reviewer1
  workers: 8
  device: cuda
  deterministic: true
  save_checkpoints: true
